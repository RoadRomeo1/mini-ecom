version: "3.8"

x-env: &kafka-common-env
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

services:
  # Zookeeper and Kafka services for local development
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      <<: *kafka-common-env

  # Database service for local development

  # PostgreSQL services for different databases serving diff microservices
  postgres-users:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes: ["pgusers:/var/lib/postgresql/data"]

  postgres-orders:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: orders
    ports:
      - "5434:5432"
    volumes: ["pgorders:/var/lib/postgresql/data"]

  postgres-payments:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: payments
    ports:
      - "5435:5432"
    volumes: ["pgpayments:/var/lib/postgresql/data"]

  postgres-products:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: products
    ports:
      - "5436:5432"
    volumes: ["pgproducts:/var/lib/postgresql/data"]

  # mongoDB services for different databases serving diff microservices
  mongo-inventory:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: inventory
    ports:
      - "27017:27017"
    volumes: ["mongodata:/data/db"]

  # Redis service for caching
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # observability services
  zipkin:
    image: openzipkin/zipkin:2.24
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:11.0.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

# Define named volumes for persistent storage
volumes:
  pgusers: {}
  pgorders: {}
  pgpayments: {}
  pgproducts: {}
  mongodata: {}
  grafana: {}
